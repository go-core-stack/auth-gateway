configDB:
  uri: "mongodb://localhost:27017"
swagger:
  dir: ""
locationService:
  host: "location-services"
  port: "8080"

# Rate limiting configuration
# Applies to all authenticated requests at the gateway
rateLimits:
  # Enable/disable rate limiting (default: false)
  enabled: true

  # Default requests per second per tenant (default: 200)
  defaultRPS: 200

  # Maximum burst size - allows temporary bursts above sustained rate
  # Defaults to defaultRPS if set to 0
  burstSize: 200

  # Cleanup settings for idle rate limiters
  cleanup:
    # How often to check for idle limiters (default: 5m)
    interval: 5m

    # Remove limiters not used within this duration (default: 10m)
    maxIdle: 10m

# Optional aliases recognized by the gateway when interpreting routes.
# Use this when a deployment's generated routes declare a scope and
# path-param name using a different term (e.g. "workspace") for the
# org-unit concept. The gateway treats that term as equivalent to "ou"
# during scope evaluation and org-unit id extraction; the org-unit RBAC
# pipeline (role checks against org-unit-users, org-unit existence
# checks, etc.) then applies unchanged. Database tables, the
# X-Auth-Context key, and audit log fields stay canonical ("ou").
# Default: not configured (no alias).
#resourceAliases:
#  # Scope/path-param name to recognize as equivalent to "ou". With the
#  # value below, a route declaring scope "workspace" and a {workspace}
#  # path param is treated identically to a route declaring scope "ou"
#  # with {ou}.
#  orgUnitScope: "workspace"

# Experimental features — not yet generally available.
# When absent, all experimental features remain disabled.
#experimental:
#  # Enable org-unit soft-delete. When false (default), delete requests
#  # return 501 Unimplemented.
#  allow_ou_delete: true
#
#  # Seconds to retain a soft-deleted org unit before the reconciler
#  # hard-deletes it. Only meaningful when allow_ou_delete is true.
#  hold_deleted_ou: 3600
