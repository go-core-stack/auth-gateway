syntax = "proto3";

package api;

import "google/api/annotations.proto";
import "coreapis/api/role.proto";

option go_package = "github.com/go-core-stack/auth-gateway/api";

// service provided to manage tenant configuration
service MyTenant {
  // Get Password policy configuration
  rpc GetMyPasswordPolicy(MyPasswordPolicyGetReq) returns (MyPasswordPolicyGetResp) {
    option (google.api.http) = {
      get: "/api/mytenant/v1/password-policy"
    };
    option (api.role) = {
      resource: "password-policy"
      verb: "get"
    };
  }

  // Update Password policy configuration
  rpc UpdateMyPasswordPolicy(MyPasswordPolicyUpdateReq) returns (MyPasswordPolicyUpdateResp) {
    option (google.api.http) = {
      put: "/api/mytenant/v1/password-policy"
      body: "*"
    };
    option (api.role) = {
      resource: "password-policy"
      verb: "update"
    };
  }

  // Get Session configuration
  rpc GetMySessionConfig(GetMySessionConfigReq) returns (GetMySessionConfigResp) {
    option (google.api.http) = {
      get: "/api/mytenant/v1/session-config"
    };
    option (api.role) = {
      resource: "session-config"
      verb: "get"
    };
  }

  // Update Session configuration
  rpc UpdateMySessionConfig(UpdateMySessionConfigReq) returns (UpdateMySessionConfigResp) {
    option (google.api.http) = {
      put: "/api/mytenant/v1/session-config"
      body: "*"
    };
    option (api.role) = {
      resource: "session-config"
      verb: "update"
    };
  }
}

// password policy get request
message MyPasswordPolicyGetReq {
}

// password policy get response
message MyPasswordPolicyGetResp {
  // minimum number of lower case characters in password
  int32 minLower = 1;

  // minimum number of upper case characters in password
  int32 minUpper = 2;

  // minimum number of digits in password
  int32 minDigits = 3;

  // minimum number of special characters in password
  int32 minSpecial = 4;

  // minimum length of password
  int32 minLength = 5;

  // maximum length of password
  int32 maxLength = 6;

  // do not allow last x recently used passwords
  int32 recentlyUsed = 7;

  // do not allow password reuse before x days
  int32 passwordAge = 8;

  // expire password after x days, trigger force change
  int32 forceExpirePasswordChange = 9;
}

// password policy update request
message MyPasswordPolicyUpdateReq {
  // minimum number of lower case characters in password
  int32 minLower = 1;

  // minimum number of upper case characters in password
  int32 minUpper = 2;

  // minimum number of digits in password
  int32 minDigits = 3;

  // minimum number of special characters in password
  int32 minSpecial = 4;

  // minimum length of password
  int32 minLength = 5;

  // maximum length of password
  int32 maxLength = 6;

  // do not allow last x recently used passwords
  int32 recentlyUsed = 7;

  // do not allow password reuse before x days
  int32 passwordAge = 8;

  // expire password after x days, trigger force change
  int32 forceExpirePasswordChange = 9;
}

// password policy update response
message MyPasswordPolicyUpdateResp {
}

// action to take when max concurrent sessions limit is exceeded
enum SessionLimitAction {
  // terminate the oldest active session
  TERMINATE_OLDEST = 0;
  // deny the new session creation
  DENY_NEW = 1;
}

// session configuration for tenant
message SessionConfig {
  // maximum number of concurrent sessions per user (0 or -1 means no limit)
  int32 max_concurrent_sessions = 1;
  
  // action to take when session limit is exceeded
  SessionLimitAction on_max_sessions_exceeded = 2;
  
  // session idle timeout in seconds (0 means no timeout)
  int32 session_idle_timeout_seconds = 3;
  
  // session maximum lifespan in seconds (0 means no limit)
  int32 session_max_lifespan_seconds = 4;
}

// get session configuration request
message GetMySessionConfigReq {
}

// get session configuration response
message GetMySessionConfigResp {
  // session configuration for the tenant
  SessionConfig config = 1;
}

// update session configuration request
message UpdateMySessionConfigReq {
  // session configuration to update
  SessionConfig config = 1;
}

// update session configuration response
message UpdateMySessionConfigResp {
}
